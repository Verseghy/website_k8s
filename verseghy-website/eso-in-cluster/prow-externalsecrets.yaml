apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-token
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
  data:
    - secretKey: cert
      remoteRef:
        key: prow-github-token/cert
    - secretKey: appid
      remoteRef:
        key: prow-github-token/appid
---
