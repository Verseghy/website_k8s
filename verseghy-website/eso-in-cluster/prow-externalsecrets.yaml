apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-root-creds
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
  data:
    - secretKey: user
      remoteRef:
        key: prow-minio-root-creds/user
    - secretKey: password
      remoteRef:
        key: prow-minio-root-creds/password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-oauth-config
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    template:
      data:
        secret: |
          client_id: {{ .client_id }}
          client_secret: {{ .client_secret }}
          redirect_url: https://prow.apps.okd4.home.zoltanszepesi.com/github-login/redirect
          final_redirect_url: https://prow.apps.okd4.home.zoltanszepesi.com/
          scopes:
          - user:email
          - read:org
          - repo
  data:
    - secretKey: client_id
      remoteRef:
        key: prow-github-oauth-config/client_id
    - secretKey: client_secret
      remoteRef:
        key: prow-github-oauth-config/client_secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cookie-secret
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: prow-cookie-secret/secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-credentials
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    template:
      data:
        service-account.json: |
          {
            "region": "minio",
            "access_key": "{{ .user }}",
            "endpoint": "http://minio.verseghy.svc.cluster.local",
            "insecure": true,
            "s3_force_path_style": true,
            "secret_key": "{{ .password }}"
          }
  data:
    - secretKey: user
      remoteRef:
        key: prow-minio-root-creds/user
    - secretKey: password
      remoteRef:
        key: prow-minio-root-creds/password
