apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: image-updater-git-creds
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    template:
      data:
        githubAppID: "2748019"
        githubAppInstallationID: "106650048"
        githubAppPrivateKey: "{{ .cert }}"
  data:
    - secretKey: cert
      remoteRef:
        key: prow-github-token/cert
