apiVersion: rhdh.redhat.com/v1alpha3
kind: Backstage
metadata:
  name: developer-hub
spec:
  application:
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: app-config-rhdh
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    extraFiles:
      configMaps:
        - name: kube-root-ca.crt
          key: ca.crt
          mountPath: /opt/app-root/src/extra-certs
    extraEnvs:
      envs:
        - name: NODE_EXTRA_CA_CERTS
          value: /opt/app-root/src/extra-certs/ca.crt
      secrets:
        - name: rhdh-secrets
        - name: rhdh-k8s-reader-token
          key: token
        - name: backstage-local-user
          key: apiToken
    route:
      enabled: true
      host: rhdh-verseghy.apps.okd4.home.zoltanszepesi.com
