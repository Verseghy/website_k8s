apiVersion: rhdh.redhat.com/v1alpha3
kind: Backstage
metadata:
  name: developer-hub
spec:
  application:
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: app-config-rhdh
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    extraEnvs:
      secrets:
        - name: rhdh-secrets
        - name: rhdh-k8s-reader-token
          key: token
        - name: backstage-local-user
          key: apiToken
    route:
      enabled: true
      host: rhdh.apps.okd4.home.zoltanszepesi.com
